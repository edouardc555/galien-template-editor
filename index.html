      '</div>'
    ).join('');
  } catch (e) {
    listEl.innerHTML = '<p style="color:#ea4335;font-size:12px;">Error loading campaigns</p>';
  }

  // Helper: render steps HTML for a campaign
  function renderStepsHtml(steps, checkedStepIds) {
    return steps.map(s =>
      '<label style="display:flex;align-items:center;gap:6px;padding:5px 8px;background:#fff;border-radius:4px;cursor:pointer;margin-bottom:3px;border-left:3px solid ' + (typeColors[s.type] || '#ccc') + ';">' +
        '<input type="checkbox"' + (checkedStepIds && checkedStepIds.includes(s.stepId) ? ' checked' : '') + ' data-seq="' + s.seqId + '" data-step="' + s.stepId + '" data-type="' + s.type + '" style="width:14px;height:14px;" onchange="updateLemPushCount()">' +
        '<div style="flex:1;min-width:0;">' +
          '<div style="display:flex;align-items:center;gap:4px;">' +
            '<span style="font-size:9px;font-weight:600;color:' + (typeColors[s.type] || '#999') + ';background:' + (typeColors[s.type] || '#999') + '15;padding:1px 5px;border-radius:3px;">' + (typeLabels[s.type] || s.type) + '</span>' +
            '<span style="font-size:9px;color:#80868b;">delay ' + s.delay + 'd</span>' +
          '</div>' +
          '<div style="font-size:10px;color:#333;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + (s.preview || '(empty)') + '</div>' +
        '</div>' +
      '</label>'
    ).join('');
  }

  // Helper: load and render steps for a campaign item
  async function loadCampaignSteps(item, checkedStepIds) {
    const stepsEl = item.querySelector('.lem-camp-steps');
    const arrow = item.querySelector('.lem-camp-arrow');
    const check = item.querySelector('.lem-camp-check');
    const camId = item.dataset.id;
    stepsEl.style.display = 'block';
    arrow.style.transform = 'rotate(90deg)';
    check.checked = true;
    stepsEl.innerHTML = '<p style="color:#80868b;font-size:11px;">Loading steps...</p>';
    try {
      const r = await fetch('http://localhost:3456/lemlist-steps/' + camId);
      const d = await r.json();
      const steps = d.steps || [];
      stepsEl.dataset.loaded = '1';
      if (steps.length === 0) { stepsEl.innerHTML = '<p style="color:#ea4335;font-size:11px;">No steps</p>'; return; }
      stepsEl.innerHTML = renderStepsHtml(steps, checkedStepIds);
      updateLemPushCount();
    } catch (e) {
      stepsEl.innerHTML = '<p style="color:#ea4335;font-size:11px;">Error: ' + e.message + '</p>';
    }
  }

  window.updateLemPushCount = function() {
    const checked = document.querySelectorAll('.lem-camp-steps input[type=checkbox]:checked');
    const count = checked.length;
    document.getElementById('lemPushCount').textContent = count > 0 ? count + ' step(s) selected' : '';
    document.getElementById('lemPushBtn').disabled = count === 0;
  };

  // Toggle campaign expansion + load steps
  window.toggleCampaignSteps = async function(headerEl) {
    const item = headerEl.closest('.lem-camp-item');
    const stepsEl = item.querySelector('.lem-camp-steps');
    const arrow = item.querySelector('.lem-camp-arrow');
    const check = item.querySelector('.lem-camp-check');
    const isOpen = stepsEl.style.display !== 'none';

    if (isOpen) {
      stepsEl.style.display = 'none';
      arrow.style.transform = '';
      check.checked = false;
      stepsEl.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = false);
      updateLemPushCount();
      return;
    }

    if (!stepsEl.dataset.loaded) {
      await loadCampaignSteps(item, null);
    } else {
      stepsEl.style.display = 'block';
      arrow.style.transform = 'rotate(90deg)';
      check.checked = true;
      updateLemPushCount();
    }
  };

  // Restore previous selections for THIS message (keyed by pipeline + step + branch)
  const selKey = 'lemPush_' + currentPipe + '_' + currentStep + '_' + currentBranch;
  const savedSel = JSON.parse(localStorage.getItem(selKey) || '{}');
  for (const camId of Object.keys(savedSel)) {
    const item = listEl.querySelector('.lem-camp-item[data-id="' + camId + '"]');
    if (item) await loadCampaignSteps(item, savedSel[camId]);
  }

  // Push button
  document.getElementById('lemPushBtn').onclick = async () => {
    const checked = document.querySelectorAll('.lem-camp-steps input[type=checkbox]:checked');
    if (checked.length === 0) { alert('Select at least one step'); return; }

    const targets = Array.from(checked).map(cb => ({
      sequenceId: cb.dataset.seq,
      stepId: cb.dataset.step,
      label: cb.dataset.type
    }));

    // Determine type from first selected (email vs linkedin)
    const firstType = targets[0].label;
    const isEmail = firstType === 'email';
    const pushType = isEmail ? 'email' : 'linkedin';

    const btn = document.getElementById('lemPushBtn');
    btn.textContent = 'Pushing ' + targets.length + ' step(s)...';
    btn.disabled = true;

    try {
      const r = await fetch('http://localhost:3456/push-lemlist', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          targets: targets,
          type: pushType,
          subject: subject,
          html: buildLemlistHtml(content),
          plainText: getPlainText(content)
        })
      });
      const data = await r.json();
      if (data.success) {
        // Save selections for next time
        const savedSel = {};
        document.querySelectorAll('.lem-camp-item').forEach(item => {
          const camId = item.dataset.id;
          const checkedSteps = Array.from(item.querySelectorAll('.lem-camp-steps input[type=checkbox]:checked')).map(cb => cb.dataset.step);
          if (checkedSteps.length > 0) savedSel[camId] = checkedSteps;
        });
        localStorage.setItem('lemPush_' + currentPipe + '_' + currentStep + '_' + currentBranch, JSON.stringify(savedSel));
        modal.remove();
        const toast = document.getElementById('toast');
        toast.textContent = 'Pushed to ' + data.updated + ' Lemlist step(s)!';
        toast.style.color = '#6c3baa';
        setTimeout(() => { toast.textContent = ''; toast.style.color = '#34a853'; }, 4000);
      } else {
        btn.textContent = (data.error || 'Failed');
        setTimeout(() => { btn.textContent = 'Push to selected'; btn.disabled = false; }, 3000);
      }
    } catch (err) {
      btn.textContent = 'Server error';
      setTimeout(() => { btn.textContent = 'Push to selected'; btn.disabled = false; }, 3000);
    }
  };
}

// ── DRAFTS FUNCTIONS ─────────────────────────────────────────

function loadDraftCount() {
  fetch('http://localhost:3456/drafts').then(r => r.json()).then(data => {
    const count = (data.drafts || []).length;
    const badge = document.getElementById('draftsBadge');
    if (badge) {
      badge.textContent = count;
      badge.style.display = count > 0 ? 'inline' : 'none';
    }
    draftsCache = data.drafts || [];
  }).catch(() => {});
}

function loadDrafts() {
  fetch('http://localhost:3456/drafts').then(r => r.json()).then(data => {
    draftsCache = data.drafts || [];
    renderDraftsList();
    loadDraftCount();
  }).catch(() => {
    document.getElementById('sidebar').innerHTML = '<div style="padding:16px;color:#ea4335;">Server not running</div>';
  });
}

function renderDraftsList() {
  const el = document.getElementById('sidebar');
  el.innerHTML = '';
  if (draftsCache.length === 0) {
    el.innerHTML = '<div style="padding:20px;color:#80868b;font-size:13px;text-align:center;">No pending drafts.<br><br><span style="font-size:11px;">Drafts appear here when the copywriter pushes them via<br><code>POST localhost:3456/draft</code></span></div>';
    return;
  }
  draftsCache.forEach((d, i) => {
    const div = document.createElement('div');
    div.className = 'draft-item' + (currentDraft === i ? ' active' : '');
    const ago = timeAgo(d.created_at);
    div.innerHTML =
      '<div class="draft-contact">' + d.contact + '</div>' +
      '<div class="draft-company">' + d.company + (d.deal ? ' — ' + d.deal : '') + '</div>' +
      '<div class="draft-subject">' + d.subject + '</div>' +
      '<div class="draft-meta"><span class="draft-source">' + d.source + '</span><span>' + ago + '</span></div>';
    div.onclick = () => selectDraft(i);
    el.appendChild(div);
  });
}

function timeAgo(isoDate) {
  const diff = Date.now() - new Date(isoDate).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hours = Math.floor(mins / 60);
  if (hours < 24) return hours + 'h ago';
  return Math.floor(hours / 24) + 'd ago';
}

function selectDraft(i) {
  // Auto-save current draft edits to cache
  if (currentDraft !== null && currentDraft !== i) {
    draftsCache[currentDraft].html = document.getElementById('fieldBody').innerHTML;
    draftsCache[currentDraft].subject = document.getElementById('fieldSubject').value;
  }
  currentDraft = i;
  currentStep = null;
  const d = draftsCache[i];
  renderDraftsList();

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('compose').style.display = 'block';
  document.getElementById('infoBar').style.display = 'flex';
  document.getElementById('branchTabs').style.display = 'none';

  document.getElementById('fieldTo').value = d.email;
  document.getElementById('fieldSubject').value = d.subject;
  document.getElementById('fieldBody').innerHTML = d.html;

  const isEdited = d.html !== d.original_html || d.subject !== d.original_subject;

  document.getElementById('infoBar').innerHTML =
    '<div class="info-left"><h2>' + d.contact + ' <small style="font-weight:400;font-size:12px;color:#80868b">(' + d.company + ')</small></h2>' +
    '<div class="info-tags"><span class="draft-source">' + d.source + '</span>' +
    (d.deal ? '<span style="font-size:11px;color:#5f6368;margin-left:8px;">' + d.deal + '</span>' : '') +
    (isEdited ? '<span class="draft-edited" style="margin-left:8px;">Edited</span>' : '') +
    '</div></div>' +
    '<div class="info-docs" style="font-size:11px;color:#80868b;">' + new Date(d.created_at).toLocaleString() + '</div>';

  swapFooterForDrafts(true);
  renderContextPanel(d);
  loadThread(d.email);
}

function renderContextPanel(draft) {
  const panel = document.getElementById('contextPanel');
  if (!draft.context) {
    panel.style.display = 'block';
    let html = '<h3>Context</h3>';

    // Contact + email
    html += '<div class="context-section"><div class="context-label">Contact</div><div class="context-value" style="font-weight:600;">' + (draft.contact || 'Unknown') + '</div></div>';
    if (draft.email) {
      html += '<div class="context-section"><div class="context-label">Email</div><div class="context-value"><a href="mailto:' + draft.email + '" style="color:#1a73e8;text-decoration:none;font-size:11px;">' + draft.email + '</a></div></div>';
    }

    // Company
    if (draft.company) {
      html += '<div class="context-section"><div class="context-label">Company</div><div class="context-value">' + draft.company + '</div></div>';
    }

    // Deal
    if (draft.deal) {
      html += '<div class="context-section"><div class="context-label">Deal</div><div class="context-value" style="color:#137333;font-weight:500;">' + draft.deal + '</div></div>';
    }

    // Reply indicator
    if (draft.reply_to) {
      html += '<div class="context-section"><div class="context-label">Type</div><div class="context-value"><span style="display:inline-block;background:#e8f0fe;color:#1967d2;font-size:10px;font-weight:600;padding:2px 8px;border-radius:3px;">REPLY</span></div></div>';
    } else {
      html += '<div class="context-section"><div class="context-label">Type</div><div class="context-value"><span style="display:inline-block;background:#fce8e6;color:#c5221f;font-size:10px;font-weight:600;padding:2px 8px;border-radius:3px;">NEW THREAD</span></div></div>';
    }

    // Source template
    if (draft.source) {
      html += '<div class="context-section"><div class="context-label">Source</div><div class="context-value" style="font-family:monospace;font-size:11px;background:#f8f9fa;padding:2px 6px;border-radius:3px;">' + draft.source + '</div></div>';
    }

    // Task ID
    if (draft.task_id) {
      html += '<div class="context-section"><div class="context-label">Task</div><div class="context-value" style="font-family:monospace;font-size:11px;">' + draft.task_id + '</div></div>';
    }

    // Timestamp
    if (draft.created_at) {
      html += '<div class="context-section"><div class="context-label">Created</div><div class="context-value" style="font-size:11px;color:#80868b;">' + new Date(draft.created_at).toLocaleString() + '</div></div>';
    }

    panel.innerHTML = html;
    return;
  }
  // Render context object as sections
  const ctx = draft.context;
  let html = '<h3>Context</h3>';
  for (const [key, value] of Object.entries(ctx)) {
    if (!value) continue;
    const label = key.replace(/_/g, ' ');
    // Check if value looks like it contains HTML or is multiline
    const isHtml = typeof value === 'string' && (value.includes('<') || value.includes('\n'));
    const displayValue = isHtml ? value.replace(/\n/g, '<br>') : value;
    html += '<div class="context-section"><div class="context-label">' + label + '</div>';
    if (key === 'last_email' || key === 'email_history') {
      html += '<div class="context-email-preview">' + displayValue + '</div>';
    } else {
      html += '<div class="context-value">' + displayValue + '</div>';
    }
    html += '</div>';
  }
  panel.style.display = 'block';
  panel.innerHTML = html;
}

function hideContextPanel() {
  document.getElementById('contextPanel').style.display = 'none';
}

function swapFooterForDrafts(isDraft) {
  const footer = document.querySelector('.compose-footer');
  if (isDraft) {
    footer.innerHTML =
      '<button class="btn btn-gmail" onclick="validateDraft()">Push to Gmail Draft</button>' +
      '<button class="btn btn-red" onclick="discardDraft()">Discard</button>' +
      '<span id="toast"></span>' +
      '<span style="flex-grow:1;"></span>' +
      '<button class="btn btn-grey" onclick="copyHTML()">Copy HTML</button>' +
      '<button class="btn btn-grey" onclick="copyText()">Copy Text</button>';
  } else {
    footer.innerHTML =
      '<button class="btn btn-blue" onclick="copyHTML()">Copy HTML</button>' +
      '<button class="btn btn-grey" onclick="copyText()">Copy Text</button>' +
      '<button class="btn btn-grey" onclick="saveStep()">Save to File</button>' +
      '<button class="btn btn-lem" onclick="pushToLemlist()" title="Push content to Lemlist campaign">&#x2B06; Push to Lemlist</button>' +
      '<span id="toast"></span>' +
      '<span style="flex-grow:1;"></span>' +
      '<div style="display:flex;align-items:center;gap:4px;border-left:1px solid #dadce0;padding-left:10px;">' +
        '<label style="font-size:11px;color:#5f6368;">Espanso:</label>' +
        '<input id="espansoTrigger" placeholder=":trigger" style="font-family:\'SF Mono\',Consolas,monospace;font-size:11px;padding:4px 6px;border:1px solid #dadce0;border-radius:3px;width:130px;background:#f8f9fa;">' +
        '<button class="btn btn-grey" onclick="saveEspanso()" style="font-size:11px;">Save Espanso</button>' +
      '</div>';
  }
}

async function validateDraft() {
  if (currentDraft === null) return;
  const d = draftsCache[currentDraft];
  const editedSubject = document.getElementById('fieldSubject').value;
  const editedHtml = document.getElementById('fieldBody').innerHTML;

  const toast = document.getElementById('toast');
  toast.textContent = 'Pushing to Gmail...';
  toast.style.color = '#5f6368';

  try {
    const r = await fetch('http://localhost:3456/draft/' + d.id + '/validate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ edited_subject: editedSubject, edited_html: editedHtml })
    });
    const result = await r.json();
    if (result.success) {
      toast.textContent = 'Draft pushed to Gmail!';
      toast.style.color = '#34a853';
      setTimeout(() => {
        currentDraft = null;
        document.getElementById('compose').style.display = 'none';
        document.getElementById('emptyState').style.display = 'flex';
        loadDrafts();
      }, 1500);
    } else {
      toast.textContent = 'Error: ' + (result.error || 'Unknown');
      toast.style.color = '#ea4335';
    }
  } catch (err) {
    toast.textContent = 'Server error';
    toast.style.color = '#ea4335';
  }
}

async function discardDraft() {
  if (currentDraft === null) return;
  const d = draftsCache[currentDraft];
  if (!confirm('Discard draft for ' + d.contact + '?')) return;
  try {
    await fetch('http://localhost:3456/draft/' + d.id, { method: 'DELETE' });
    currentDraft = null;
    document.getElementById('compose').style.display = 'none';
    document.getElementById('emptyState').style.display = 'flex';
    loadDrafts();
  } catch {}
}

init();

// ── EMAIL THREAD PANEL ──────────────────────────────────────
async function loadThread(email) {
  const panel = document.getElementById('threadPanel');
  const container = document.getElementById('threadEmails');
  const countEl = document.getElementById('threadCount');

  if (!email) {
    panel.style.display = 'none';
    return;
  }

  panel.style.display = 'block';
  container.innerHTML = '<div class="thread-spinner">Loading email thread...</div>';
  countEl.textContent = '';

  try {
    const res = await fetch(`http://localhost:3456/email-thread?email=${encodeURIComponent(email)}`);
    const data = await res.json();
    if (!data.success || !data.emails || data.emails.length === 0) {
      container.innerHTML = '<div class="thread-spinner">No previous emails found</div>';
      return;
    }
    countEl.textContent = `(${data.emails.length})`;
    renderThread(data.emails, container);
  } catch (err) {
    container.innerHTML = '<div class="thread-spinner">Could not load thread</div>';
  }
}

function renderThread(emails, container) {
  container.innerHTML = '';
  for (const e of emails) {
    const isOutbound = (e.from_email || '').includes('galienfoundation.org');
    const card = document.createElement('div');
    card.className = 'thread-email ' + (isOutbound ? 'outbound' : 'inbound');

    const dateStr = e.date ? new Date(e.date).toLocaleDateString('en-US', {month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'}) : '';

    card.innerHTML =
      '<div class="thread-email-header">' +
        '<span class="thread-email-from">' + e.from + '</span>' +
        '<span class="thread-email-date">' + dateStr + '</span>' +
      '</div>' +
      '<div class="thread-email-subject">' + e.subject + '</div>' +
      '<div class="thread-email-body truncated" id="tbody_' + e.id + '">' + (e.body_full || e.body_snippet) + '</div>' +
      ((e.body_full || e.body_snippet || '').length > 300 ? '<div class="thread-toggle" onclick="toggleThreadEmail(this)">Show more</div>' : '');

    container.appendChild(card);
  }
}

function toggleThreadEmail(el) {
  const body = el.previousElementSibling;
  const isExpanded = body.classList.contains('expanded');
  body.classList.toggle('expanded');
  body.classList.toggle('truncated');
  el.textContent = isExpanded ? 'Show more' : 'Show less';
}

// ── SUGGESTION QUEUE ────────────────────────────────────────
let sugQueue = [];
let sugIndex = 0;
let lastQueueLen = 0;
let acceptedSuggestion = null;
let acceptedSugs = new Set(); // Track accepted suggestion IDs

function startSuggestionPoll() {
  setInterval(async () => {
    try {
      const res = await fetch('http://localhost:3456/suggestion');
      const data = await res.json();
      if (!Array.isArray(data)) return;
      if (data.length !== lastQueueLen) {
        sugQueue = data;
        lastQueueLen = data.length;
        renderSugTabs();
      }
    } catch {}
  }, 2000);
}

function renderSugTabs() {
  const tabsEl = document.getElementById('sugTabs');
  if (!tabsEl) return;
  tabsEl.innerHTML = '';
  sugQueue.forEach((sug, i) => {
    const tab = document.createElement('span');
    tab.className = 'sug-tab' + (i === sugIndex ? ' active' : '') + (acceptedSugs.has(sug.id) ? ' done' : '');
    tab.textContent = sug.stepName || ('Step ' + sug.step);
    tab.onclick = () => showSuggestionAt(i);
    tabsEl.appendChild(tab);
  });
}

function showSuggestionAt(i) {
  if (sugQueue.length === 0) { closeSuggestionPanel(); return; }
  sugIndex = Math.max(0, Math.min(i, sugQueue.length - 1));
  const sug = sugQueue[sugIndex];

  // Fill suggestion (editable)
  document.getElementById('sugSubject').value = sug.subject || '';
  document.getElementById('sugBody').innerHTML = sug.html || '';
  document.getElementById('sugStepName').textContent = sug.stepName || ('Step ' + sug.step);
  renderSugTabs();

  // Show split view
  document.getElementById('compose').style.display = 'block';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('suggestionCompose').style.display = 'block';
  document.querySelector('.editor-wrap').classList.add('split-mode');
}

function acceptSuggestion() {
  if (sugQueue.length === 0) return;
  const sug = sugQueue[sugIndex];
  // Transfer the EDITED suggestion content to the template editor
  const editedSubject = document.getElementById('sugSubject').value;
  const editedHtml = document.getElementById('sugBody').innerHTML;
  acceptedSuggestion = { subject: editedSubject, html: editedHtml };
  document.getElementById('fieldSubject').value = editedSubject;
  document.getElementById('fieldBody').innerHTML = editedHtml;
  // Mark as accepted visually, remove from queue
  acceptedSugs.add(sug.id);
  removeSuggestion(sug.id);
  showToast('Suggestion accepted and transferred to template');
}

function giveFeedback() {
  if (sugQueue.length === 0) return;
  const sug = sugQueue[sugIndex];
  const editedSubject = document.getElementById('sugSubject').value;
  const editedHtml = document.getElementById('sugBody').innerHTML;
  // Send feedback to server (diff between original suggestion and edited version)
  fetch('http://localhost:3456/feedback-suggestion', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      original_subject: sug.subject,
      edited_subject: editedSubject,
      original_html: sug.html,
      edited_html: editedHtml
    })
  }).then(r => r.json()).then(d => {
    showToast('Feedback sent to copywriter' + (d.diff ? ': ' + d.diff : ''));
  }).catch(() => showToast('Feedback saved'));
  // Update the suggestion in queue with the edited version
  sug.subject = editedSubject;
  sug.html = editedHtml;
}

function dismissSuggestion() {
  if (sugQueue.length === 0) return;
  removeSuggestion(sugQueue[sugIndex].id);
}

function removeSuggestion(id) {
  fetch('http://localhost:3456/suggestion/' + id, {method: 'DELETE'}).catch(() => {});
  sugQueue = sugQueue.filter(s => s.id !== id);
  lastQueueLen = sugQueue.length;
  if (sugQueue.length === 0) { closeSuggestionPanel(); return; }
  if (sugIndex >= sugQueue.length) sugIndex = sugQueue.length - 1;
  showSuggestionAt(sugIndex);
}

function closeSuggestionPanel() {
  document.getElementById('suggestionCompose').style.display = 'none';
  document.querySelector('.editor-wrap').classList.remove('split-mode');
  renderSugTabs();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  setTimeout(() => { t.textContent = ''; }, 3000);
}

startSuggestionPoll();

  const banner = document.createElement('div');

  banner.innerHTML = '⚠️ Server not running — Save will not work. Run in terminal: <code style="background:#fff3cd;padding:2px 6px;border-radius:3px;">~/template-editor/start.sh</code> <span style="margin-left:12px;color:#1a73e8;text-decoration:underline;">Dismiss</span>';
  banner.querySelector('span').onclick = () => banner.remove();
  document.body.insertBefore(banner, document.body.firstChild);
});
