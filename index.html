      "html": "<p style=\"font-family: Arial, sans-serif; font-size: 13px; line-height: 160%; color: rgb(51, 51, 51); margin: 0px; box-sizing: border-box;\">Dear {{salutationLastName}},<br style=\"box-sizing: border-box;\"><br style=\"box-sizing: border-box;\"></p><p style=\"font-family: Arial, sans-serif; font-size: 13px; line-height: 160%; color: rgb(51, 51, 51); margin: 0px; box-sizing: border-box;\">{{opening}}</p><p style=\"font-family: Arial, sans-serif; font-size: 13px; line-height: 160%; color: rgb(51, 51, 51); margin: 0px; box-sizing: border-box;\"><br style=\"box-sizing: border-box;\">I would be pleased to share detailed information regarding the Prix Galien USA, an initiative I am working along with the Committee Chairs, <strong style=\"font-weight: 700; box-sizing: border-box;\">Kenneth C. Frazier - Retired Chairman and CEO, Merck &amp; Co</strong>., Inc. - and <strong style=\"font-weight: 700; box-sizing: border-box;\">Dr. Michael Rosenblatt - Member, Harvard Board of Overseers; Advisory Partner, Ascenta Capital &amp; Flagship Pioneering</strong> - and the <strong style=\"font-weight: 700; box-sizing: border-box;\">Galien Foundation.</strong></p><p style=\"font-family: Arial, sans-serif; font-size: 13px; line-height: 160%; color: rgb(51, 51, 51); margin: 0px; box-sizing: border-box;\"><br style=\"box-sizing: border-box;\">The Galien Foundation fosters, recognizes and rewards excellence in scientific innovation that improves the state of human health. Worldwide, the Prix Galien is regarded as the equivalent of the <strong style=\"font-weight: 700; box-sizing: border-box;\">Nobel Prize</strong> in biopharmaceutical and medical technology research.<br style=\"box-sizing: border-box;\"><br style=\"box-sizing: border-box;\"></p><p style=\"font-family: Arial, sans-serif; font-size: 13px; line-height: 160%; color: rgb(51, 51, 51); margin: 0px; box-sizing: border-box;\"><strong style=\"font-weight: 700; box-sizing: border-box;\">2026 will be an exceptional year:</strong> we are celebrating the <strong style=\"font-weight: 700; box-sizing: border-box;\">20th anniversary of the Prix Galien USA</strong> alongside the <strong style=\"font-weight: 700; box-sizing: border-box;\">International Prix Galien</strong>, which will bring together all worldwide winners from the past two years.</p><p style=\"font-family: Arial, sans-serif; font-size: 13px; line-height: 160%; color: rgb(51, 51, 51); margin: 0px; box-sizing: border-box;\"><br style=\"box-sizing: border-box;\">{{pitch}}<br style=\"box-sizing: border-box;\"><br style=\"box-sizing: border-box;\"></p><p style=\"font-family: Arial, sans-serif; font-size: 13px; line-height: 160%; color: rgb(51, 51, 51); margin: 0px; box-sizing: border-box;\">If it's relevant and if you are available, I would be delighted to discuss with you about your potential application and answer your questions. Would you be available on {% spin %}{% variation %}Monday 2:30 PM{% variation %}Wednesday 4:00 PM{% variation %}Friday 7:30 AM{% endspin %} EST for a quick call?&nbsp;<br style=\"box-sizing: border-box;\"><br style=\"box-sizing: border-box;\">If not, I'm happy to accommodate your schedule. You can also <a href=\"https://galienfoundation.org/meetings/pgusa/nomination\" style=\"color: rgb(26, 115, 232); text-decoration: none; background-color: transparent; user-select: auto; box-sizing: border-box; font-weight: 500;\">book a meeting here</a>.</p><p style=\"font-family: Arial, sans-serif; font-size: 13px; line-height: 160%; color: rgb(51, 51, 51); margin: 0px; box-sizing: border-box;\"><br style=\"box-sizing: border-box;\">With many thanks and kind regards,</p><p style=\"font-family: Arial, sans-serif; font-size: 13px; line-height: 160%; color: rgb(51, 51, 51); margin: 0px; box-sizing: border-box;\"><br style=\"box-sizing: border-box;\">Edouard</p><p style=\"font-family: Arial, sans-serif; font-size: 12px; line-height: 150%; color: rgb(51, 51, 51); margin: 20px 0px 0px; box-sizing: border-box;\"><strong style=\"font-weight: 700; box-sizing: border-box;\">Edouard L. Cohen, M.D.</strong> | Chief Innovation Officer<br style=\"box-sizing: border-box;\">The Galien Foundation<br style=\"box-sizing: border-box;\">Phone: +1 929 470 7341<br style=\"box-sizing: border-box;\">LinkedIn: <a href=\"https://www.linkedin.com/in/edouardcohen-md\" style=\"color: rgb(26, 115, 232); text-decoration: none; background-color: transparent; user-select: auto; box-sizing: border-box; font-weight: 500;\">www.linkedin.com/in/edouardcohen-md</a></p><hr style=\"border-right: none; border-bottom: none; border-left: none; border-image: initial; border-top: 1px solid rgb(204, 204, 204); margin: 30px 0px 20px; overflow: visible; width: 100%; clear: both; break-after: page; user-select: none; box-sizing: border-box; height: 0px;\"><p style=\"font-family: Arial, sans-serif; font-size: 11px; line-height: 150%; color: rgb(102, 102, 102); margin: 0px; box-sizing: border-box;\">From: ...@galienfoundation.org</p><blockquote style=\"margin: 0px 0px 0px 0.8ex; border-left: 1px solid rgb(204, 204, 204); padding-left: 1ex; color: rgb(94, 53, 177); box-sizing: border-box;\"><div style=\"max-width: 600px; margin: 0px auto; background-color: rgb(255, 255, 255); padding: 0px 20px; box-sizing: border-box; color: #333333;\"><div style=\"display: none; max-height: 0px; overflow: hidden; box-sizing: border-box;\"> {{company}} — 20th Prix Galien USA &amp; Prix Galien International in NYC </div> &nbsp;<img height=\"145\" data-fr-image-pasted=\"true\" alt=\"Prix Galien USA logo\" width=\"386\" src=\"https://app.lemlist.com/api/files/Files/fil_CQkjsBFdi98d3uRck.png\" style=\"box-sizing: border-box; vertical-align: top; border-style: none; padding: 0px 1px; max-width: 100%; position: relative; cursor: pointer; user-select: none; width: 386px; display: block; margin: 5px auto; text-align: center;\" id=\"isPasted\">&nbsp; &nbsp;&nbsp;<p style=\"margin: 25px 0px 0px; font-size: 13px; line-height: 150%; box-sizing: border-box;\">Dear Colleague,<br style=\"box-sizing: border-box;\"><br style=\"box-sizing: border-box;\"></p><p style=\"text-align: justify; margin: 0px; font-size: 13px; line-height: 150%; box-sizing: border-box;\"><strong style=\"font-weight: 700; box-sizing: border-box;\">We are pleased to inform you that nominations are now open for the 2026 Prix Galien Awards – our 20th Anniversary Edition.</strong></p><p style=\"text-align: justify; margin: 0px; font-size: 13px; line-height: 150%; box-sizing: border-box;\"><br style=\"box-sizing: border-box;\">This year marks an historic milestone: the 20th Anniversary of the Prix Galien USA will coincide with the <strong style=\"font-weight: 700; box-sizing: border-box;\">Prix Galien International Awards</strong>, bringing together the world's most groundbreaking innovations under one roof in New York City. Following the success of the 2024 International ceremony in Rome, this unprecedented celebration will honor the best of national and global laureates.</p><p style=\"text-align: justify; margin: 0px; font-size: 13px; line-height: 150%; box-sizing: border-box;\"><br style=\"box-sizing: border-box;\">The Prix Galien Awards were created in 1970 to honor <strong style=\"font-weight: 700; box-sizing: border-box;\">biomedical research and medical technology products that improve the human condition.</strong> Today, it is considered the equivalent of the <strong style=\"font-weight: 700; box-sizing: border-box;\">Nobel Prizes for the Life Sciences industries worldwide.</strong> Our leadership committee includes numerous Nobel Prize laureates and many of the industry's greatest innovation champions.</p><p style=\"text-align: justify; margin: 0px; font-size: 13px; line-height: 150%; box-sizing: border-box;\"><br style=\"box-sizing: border-box;\">In 2025, we honored groundbreaking innovations from Gilead Sciences, Regeneron &amp; Sanofi, Servier, Edwards Lifesciences, ŌURA, Endless Frontier Labs, Dren Bio, and Resuscitec, as well as Michael J. Fox for his extraordinary contributions to Parkinson's disease research.</p><p style=\"text-align: justify; margin: 0px; font-size: 13px; line-height: 150%; box-sizing: border-box;\"><br style=\"box-sizing: border-box;\">Judges that review nominations have expertise in the sciences, financial services, and consulting and include biomedical scientists, entrepreneurs, physicians and executives at leading entities. Award recipients will be revealed in <strong style=\"font-weight: 700; box-sizing: border-box;\">New York City on Wednesday, October 29th, 2026</strong>, at the American Museum of Natural History.<br style=\"box-sizing: border-box;\"><br style=\"box-sizing: border-box;\"></p><p style=\"text-align: justify; margin: 0px; font-size: 13px; line-height: 150%; box-sizing: border-box;\">As a key player who stimulates and promotes therapeutic innovation, we invite you to submit your innovation for consideration for this highest accolade in the following category:</p><ul style=\"margin: 15px 0px; box-sizing: border-box;\"><li style=\"font-size: 13px; box-sizing: border-box;\"><strong style=\"font-weight: 700; box-sizing: border-box;\">{{uSACategoryPrincipal}}</strong></li></ul><p style=\"margin: 0px; font-size: 13px; line-height: 150%; box-sizing: border-box;\">You can start your very simple submission process here and our team will be in touch shortly.</p><table align=\"left\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin: 20px 0px; border-collapse: collapse; border: none; empty-cells: show; max-width: 100%; box-sizing: border-box;\"><tbody style=\"box-sizing: border-box;\"><tr style=\"box-sizing: border-box;\"><td align=\"center\" bgcolor=\"#E60F51\" style=\"border-radius: 8px; min-width: 5px; box-sizing: border-box; border: 0px solid rgb(221, 221, 221); user-select: text;\"> <a href=\"https://www.galienfoundation.org/_hcms/mem/login\" target=\"_blank\" style=\"color: rgb(255, 255, 255); font-size: 18px; font-family: Arial, sans-serif; text-decoration: none; padding: 12px 24px; display: block; font-weight: normal; background-color: transparent; user-select: auto; box-sizing: border-box;\">Submit your innovation</a> </td></tr></tbody></table><br style=\"clear: both; box-sizing: border-box;\"><p style=\"margin: 30px 0px 0px; font-size: 13px; line-height: 150%; box-sizing: border-box;\">With our best personal regards,</p><div style=\"margin-top: 25px; box-sizing: border-box;\"><p style=\"margin: 0px; font-size: 13px; line-height: 150%; color: rgb(51, 51, 51); font-style: italic; font-weight: bold; box-sizing: border-box;\">Michael Rosenblatt, M.D.</p><p style=\"margin: 0px; font-size: 12px; line-height: 140%; box-sizing: border-box;\">Committee Chair, Prix Galien USA (Categories: Pharma, Biotech, Rare/Orphan)<br style=\"box-sizing: border-box;\">Co-chair, Galien Forum<br style=\"box-sizing: border-box;\"><br style=\"box-sizing: border-box;\"></p><p style=\"margin: 0px; font-size: 13px; line-height: 150%; color: rgb(51, 51, 51); font-style: italic; font-weight: bold; box-sizing: border-box;\">Kenneth C. Frazier</p><p style=\"margin: 0px; font-size: 12px; line-height: 140%; box-sizing: border-box;\">Committee Chair, Prix Galien USA (Categories: StartUp, Medical Technology, Incubator/Accelerator/Equity, Digital Health)<br style=\"box-sizing: border-box;\">Co-chair, Galien Forum</p><p style=\"margin: 0px; font-size: 13px; line-height: 150%; color: rgb(51, 51, 51); font-style: italic; font-weight: bold; box-sizing: border-box;\"><br style=\"box-sizing: border-box;\">Phillip A. Sharp, Ph.D.</p><p style=\"margin: 0px; font-size: 12px; line-height: 140%; box-sizing: border-box;\">Nobel Laureate, Committee Member, Prix Galien USA<br style=\"box-sizing: border-box;\">Co-chair, Galien Forum<br style=\"box-sizing: border-box;\"><br style=\"box-sizing: border-box;\"></p><p style=\"margin: 0px; font-size: 13px; line-height: 150%; color: rgb(51, 51, 51); font-style: italic; font-weight: bold; box-sizing: border-box;\">Marc Tessier-Lavigne, Ph.D.</p><p style=\"margin: 0px; font-size: 12px; line-height: 140%; box-sizing: border-box;\">Committee Member, Prix Galien USA<br style=\"box-sizing: border-box;\">Co-chair, Galien Forum</p></div><div style=\"font-size: 10px; line-height: 140%; color: rgb(68, 68, 68); margin-top: 25px; box-sizing: border-box;\"><p style=\"margin: 0px; font-size: 11px; line-height: 150%; font-weight: bold; box-sizing: border-box;\">Prix Galien Awards Committee</p><p style=\"margin: 0px 0px 5px; font-size: 13px; line-height: 150%; box-sizing: border-box; font-style: italic !important; font-weight: normal !important;\"><em style=\"box-sizing: border-box;\"><small style=\"font-size: 80%; font-weight: 400; box-sizing: border-box;\">Categories: Pharmaceutical, Biotechnology, Orphan/Rare Diseases</small></em></p><ul style=\"margin: 0px; padding-left: 15px; box-sizing: border-box;\"><li style=\"margin-bottom: 3px; box-sizing: border-box;\"><strong style=\"font-weight: 700; box-sizing: border-box;\">Dr. Michael ROSENBLATT</strong>, M.D., Member, Harvard Board of Overseers; Advisory Partner, Ascenta Capital; Senior Advisor, Bain Capital Life Sciences &amp; Flagship Pioneering; Committee Chair</li><li style=\"margin-bottom: 3px; box-sizing: border-box;\"><strong style=\"font-weight: 700; box-sizing: border-box;\">Dr. Linda BUCK</strong>, Ph.D., Nobel Laureate, Fred Hutchinson Cancer Research Center, University of Washington</li><li style=\"margin-bottom: 3px; box-sizing: border-box;\"><strong style=\"font-weight: 700; box-sizing: border-box;\">Dr. Sue DESMOND-HELLMANN</strong>, M.D., M.P.H., Former CEO, Bill &amp; Melinda Gates Foundation</li><li style=\"margin-bottom: 3px; box-sizing: border-box;\"><strong style=\"font-weight: 700; box-sizing: border-box;\">Dr. Laurie GLIMCHER</strong>, M.D., CEO &amp; President, Dana Farber Cancer Institute, Harvard Medical School</li><li style=\"margin-bottom: 3px; box-sizing: border-box;\"><strong style=\"font-weight: 700; box-sizing: border-box;\">Dr. Avram HERSHKO</strong>, M.D., Ph.D., Nobel Laureate, Technion - Israel Institute of Technology</li><li style=\"margin-bottom: 3px; box-sizing: border-box;\"><strong style=\"font-weight: 700; box-sizing: border-box;\">Dr. Mary-Claire KING</strong>, Ph.D., American Cancer Society Professor of Genome Sciences, University of Washington</li><li style=\"margin-bottom: 3px; box-sizing: border-box;\"><strong style=\"font-weight: 700; box-sizing: border-box;\">Dr. Cato T. LAURENCIN</strong>, M.D., Ph.D., University Professor, University of Connecticut</li><li style=\"margin-bottom: 3px; box-sizing: border-box;\"><strong style=\"font-weight: 700; box-sizing: border-box;\">Dr. Steven J. LESTER</strong>, M.D., Chief Medical Officer, Mayo Clinic-ASU MedTech Accelerator</li><li style=\"margin-bottom: 3px; box-sizing: border-box;\"><strong style=\"font-weight: 700; box-sizing: border-box;\">Dr. Stanley B. PRUSINER</strong>, M.D., Nobel Laureate, Professor of Neurology, UCSF</li><li style=\"margin-bottom: 3px; box-sizing: border-box;\"><strong style=\"font-weight: 700; box-sizing: border-box;\">Dr. Phillip A. SHARP</strong>, Ph.D., Nobel Laureate, Professor of Biology, MIT Koch Institute</li><li style=\"margin-bottom: 3px; box-sizing: border-box;\"><strong style=\"font-weight: 700; box-sizing: border-box;\">Dr. Marc TESSIER-LAVIGNE</strong>, Ph.D., Chairman and CEO, Xaira Therapeutics; President Emeritus, Stanford University</li><li style=\"margin-bottom: 3px; box-sizing: border-box;\"><strong style=\"font-weight: 700; box-sizing: border-box;\">Pr. Elie WIESEL</strong>, Peace Nobel Laureate, Honorary Founding President, In Memoriam</li></ul><p style=\"margin: 20px 0px 5px; font-size: 13px; line-height: 150%; box-sizing: border-box; font-style: italic !important; font-weight: normal !important;\"><em style=\"box-sizing: border-box;\"><small style=\"font-size: 80%; font-weight: 400; box-sizing: border-box;\">Categories: Medical Technology, Digital Health Solution, Incubators/Accelerators/Equity, Start-Up</small></em></p><ul style=\"margin: 0px; padding-left: 15px; box-sizing: border-box;\"><li style=\"margin-bottom: 3px; box-sizing: border-box;\"><strong style=\"font-weight: 700; box-sizing: border-box;\">Mr. Kenneth C. FRAZIER</strong>, J.D., Former Chairman &amp; CEO, Merck &amp; Co., Inc.; Committee Chair</li><li style=\"margin-bottom: 3px; box-sizing: border-box;\"><strong style=\"font-weight: 700; box-sizing: border-box;\">Dr. Roch DOLIVEUX</strong>, D.V.M., Honorary CEO, UCB</li><li style=\"margin-bottom: 3px; box-sizing: border-box;\"><strong style=\"font-weight: 700; box-sizing: border-box;\">Dr. Mikael DOLSTEN</strong>, M.D., Ph.D., Chairman &amp; Founding CEO, Quarry Thera; Former CSO, Pfizer</li><li style=\"margin-bottom: 3px; box-sizing: border-box;\"><strong style=\"font-weight: 700; box-sizing: border-box;\">Mr. Alex GORSKY</strong>, M.B.A., Former CEO &amp; Executive Chairman, Johnson &amp; Johnson</li><li style=\"margin-bottom: 3px; box-sizing: border-box;\"><strong style=\"font-weight: 700; box-sizing: border-box;\">Dr. Penny HEATON</strong>, M.D., Global Head, Office of the Chief Medical Officer, Johnson &amp; Johnson</li><li style=\"margin-bottom: 3px; box-sizing: border-box;\"><strong style=\"font-weight: 700; box-sizing: border-box;\">Ms. Sheri McCOY</strong>, M.Sc., M.B.A., Board of Directors, AstraZeneca; Former CEO, Avon</li><li style=\"margin-bottom: 3px; box-sizing: border-box;\"><strong style=\"font-weight: 700; box-sizing: border-box;\">Dr. Joel S. MARCUS</strong>, J.D., C.P.A., Executive Chairman &amp; Founder, Alexandria</li><li style=\"margin-bottom: 3px; box-sizing: border-box;\"><strong style=\"font-weight: 700; box-sizing: border-box;\">Dr. Elias ZERHOUNI</strong>, M.D., Former Director, U.S. National Institutes of Health; Former Head of Global R&amp;D, Sanofi</li></ul></div><div style=\"font-size: 11px; color: rgb(102, 102, 102); text-align: center; margin-top: 30px; padding: 15px 0px; border-top: 1px solid rgb(238, 238, 238); box-sizing: border-box;\"><p style=\"margin: 0px; font-size: 13px; line-height: 150%; box-sizing: border-box;\">USA · The Galien Foundation, 99 John Street, Suite 2502, New York, New York 10038, USA, 212-685-1592</p><p style=\"margin: 10px 0px 0px; font-size: 13px; line-height: 150%; box-sizing: border-box;\">If this is not relevant to you, reply \"not relevant\" to this email</p></div></div></blockquote>",
      "htmlA": "<div style=\"display: none; max-height: 0px; overflow: hidden; box-sizing: border-box;\">    {{pitch}}</div><p style=\"font-family: Arial, sans-serif; font-size: 13px; line-height: 160%; color: rgb(51, 51, 51); margin: 0px; box-sizing: border-box;\">Dear {{salutationLastName}},<br style=\"box-sizing: border-box;\"><br style=\"box-sizing: border-box;\"></p><p style=\"font-family: Arial, sans-serif; font-size: 13px; line-height: 160%; color: rgb(51, 51, 51); margin: 0px; box-sizing: border-box;\">{{opening}}</p><p style=\"font-family: Arial, sans-serif; font-size: 13px; line-height: 160%; color: rgb(51, 51, 51); margin: 0px; box-sizing: border-box;\"><br style=\"box-sizing: border-box;\">I would be pleased to share detailed information regarding the Prix Galien USA, an initiative I am working along with the Committee Chairs, <strong style=\"font-weight: 700; box-sizing: border-box;\">Kenneth C. Frazier - Retired Chairman and CEO, Merck &amp; Co</strong>., Inc. - and <strong style=\"font-weight: 700; box-sizing: border-box;\">Dr. Michael Rosenblatt - Member, Harvard Board of Overseers; Advisory Partner, Ascenta Capital &amp; Flagship Pioneering</strong> - and the <strong style=\"font-weight: 700; box-sizing: border-box;\">Galien Foundation.</strong></p><p style=\"font-family: Arial, sans-serif; font-size: 13px; line-height: 160%; color: rgb(51, 51, 51); margin: 0px; box-sizing: border-box;\"><br style=\"box-sizing: border-box;\">The Galien Foundation fosters, recognizes and rewards excellence in scientific innovation that improves the state of human health. Worldwide, the Prix Galien is regarded as the equivalent of the <strong style=\"font-weight: 700; box-sizing: border-box;\">Nobel Prize</strong> in biopharmaceutical and medical technology research.<br style=\"box-sizing: border-box;\"><br style=\"box-sizing: border-box;\"></p><p style=\"font-family: Arial, sans-serif; font-size: 13px; line-height: 160%; color: rgb(51, 51, 51); margin: 0px; box-sizing: border-box;\"><strong style=\"font-weight: 700; box-sizing: border-box;\">2026 will be an exceptional year:</strong> we are celebrating the <strong style=\"font-weight: 700; box-sizing: border-box;\">20th anniversary of the Prix Galien USA</strong> alongside the <strong style=\"font-weight: 700; box-sizing: border-box;\">International Prix Galien</strong>, which will bring together all worldwide winners from the past two years.</p><p style=\"font-family: Arial, sans-serif; font-size: 13px; line-height: 160%; color: rgb(51, 51, 51); margin: 0px; box-sizing: border-box;\"><br style=\"box-sizing: border-box;\">{{pitch}}<br style=\"box-sizing: border-box;\"><br style=\"box-sizing: border-box;\"></p><p style=\"font-family: Arial, sans-serif; font-size: 13px; line-height: 160%; color: rgb(51, 51, 51); margin: 0px; box-sizing: border-box;\">If it's relevant and if you are available, I would be delighted to discuss with you about your potential application and answer your questions. Would you be available on {% spin %}{% variation %}Monday 2:30 PM{% variation %}Wednesday 4:00 PM{% variation %}Friday 7:30 AM{% endspin %} EST for a quick call?&nbsp;<br style=\"box-sizing: border-box;\"><br style=\"box-sizing: border-box;\">If not, I'm happy to accommodate your schedule. You can also <a href=\"https://galienfoundation.org/meetings/pgusa/nomination\" style=\"color: rgb(26, 115, 232); text-decoration: none; background-color: transparent; user-select: auto; box-sizing: border-box; font-weight: 500;\">book a meeting here</a>.</p><p style=\"font-family: Arial, sans-serif; font-size: 13px; line-height: 160%; color: rgb(51, 51, 51); margin: 0px; box-sizing: border-box;\"><br style=\"box-sizing: border-box;\">With many thanks and kind regards,</p><p style=\"font-family: Arial, sans-serif; font-size: 13px; line-height: 160%; color: rgb(51, 51, 51); margin: 0px; box-sizing: border-box;\"><br style=\"box-sizing: border-box;\">Edouard</p><p style=\"font-family: Arial, sans-serif; font-size: 12px; line-height: 150%; color: rgb(51, 51, 51); margin: 20px 0px 0px; box-sizing: border-box;\"><strong style=\"font-weight: 700; box-sizing: border-box;\">Edouard L. Cohen, M.D.</strong> | Chief Innovation Officer<br style=\"box-sizing: border-box;\">The Galien Foundation<br style=\"box-sizing: border-box;\">Phone: +1 929 470 7341<br style=\"box-sizing: border-box;\">LinkedIn: <a href=\"https://www.linkedin.com/in/edouardcohen-md\" style=\"color: rgb(26, 115, 232); text-decoration: none; background-color: transparent; user-select: auto; box-sizing: border-box; font-weight: 500;\">www.linkedin.com/in/edouardcohen-md</a></p><hr style=\"border-right: none; border-bottom: none; border-left: none; border-image: initial; border-top: 1px solid rgb(204, 204, 204); margin: 30px 0px 20px; overflow: visible; width: 100%; clear: both; break-after: page; user-select: none; box-sizing: border-box; height: 0px;\"><p style=\"font-family: Arial, sans-serif; font-size: 11px; line-height: 150%; color: rgb(102, 102, 102); margin: 0px; box-sizing: border-box;\">From: ...@galienfoundation.org</p><blockquote style=\"margin: 0px 0px 0px 0.8ex; border-left: 1px solid rgb(204, 204, 204); padding-left: 1ex; color: rgb(94, 53, 177); box-sizing: border-box;\"><div style=\"max-width: 600px; margin: 0px auto; background-color: rgb(255, 255, 255); padding: 0px 20px; box-sizing: border-box; color: #333333;\"><div style=\"display: none; max-height: 0px; overflow: hidden; box-sizing: border-box;\"> {{company}} — 20th Prix Galien USA &amp; Prix Galien International in NYC </div> &nbsp;<img height=\"145\" data-fr-image-pasted=\"true\" alt=\"Prix Galien USA logo\" width=\"386\" src=\"https://app.lemlist.com/api/files/Files/fil_CQkjsBFdi98d3uRck.png\" style=\"box-sizing: border-box; vertical-align: top; border-style: none; padding: 0px 1px; max-width: 100%; position: relative; cursor: pointer; user-select: none; width: 386px; display: block; margin: 5px auto; text-align: center;\" id=\"isPasted\">&nbsp; &nbsp;&nbsp;<p style=\"margin: 25px 0px 0px; font-size: 13px; line-height: 150%; box-sizing: border-box;\">Dear Colleague,<br style=\"box-sizing: border-box;\"><br style=\"box-sizing: border-box;\"></p><p style=\"text-align: justify; margin: 0px; font-size: 13px; line-height: 150%; box-sizing: border-box;\"><strong style=\"font-weight: 700; box-sizing: border-box;\">We are pleased to inform you that nominations are now open for the 2026 Prix Galien Awards – our 20th Anniversary Edition.</strong></p><p style=\"text-align: justify; margin: 0px; font-size: 13px; line-height: 150%; box-sizing: border-box;\"><br style=\"box-sizing: border-box;\">This year marks an historic milestone: the 20th Anniversary of the Prix Galien USA will coincide with the <strong style=\"font-weight: 700; box-sizing: border-box;\">Prix Galien International Awards</strong>, bringing together the world's most groundbreaking innovations under one roof in New York City. Following the success of the 2024 International ceremony in Rome, this unprecedented celebration will honor the best of national and global laureates.</p><p style=\"text-align: justify; margin: 0px; font-size: 13px; line-height: 150%; box-sizing: border-box;\"><br style=\"box-sizing: border-box;\">The Prix Galien Awards were created in 1970 to honor <strong style=\"font-weight: 700; box-sizing: border-box;\">biomedical research and medical technology products that improve the human condition.</strong> Today, it is considered the equivalent of the <strong style=\"font-weight: 700; box-sizing: border-box;\">Nobel Prizes for the Life Sciences industries worldwide.</strong> Our leadership committee includes numerous Nobel Prize laureates and many of the industry's greatest innovation champions.</p><p style=\"text-align: justify; margin: 0px; font-size: 13px; line-height: 150%; box-sizing: border-box;\"><br style=\"box-sizing: border-box;\">In 2025, we honored groundbreaking innovations from Gilead Sciences, Regeneron &amp; Sanofi, Servier, Edwards Lifesciences, ŌURA, Endless Frontier Labs, Dren Bio, and Resuscitec, as well as Michael J. Fox for his extraordinary contributions to Parkinson's disease research.</p><p style=\"text-align: justify; margin: 0px; font-size: 13px; line-height: 150%; box-sizing: border-box;\"><br style=\"box-sizing: border-box;\">Judges that review nominations have expertise in the sciences, financial services, and consulting and include biomedical scientists, entrepreneurs, physicians and executives at leading entities. Award recipients will be revealed in <strong style=\"font-weight: 700; box-sizing: border-box;\">New York City on Wednesday, October 29th, 2026</strong>, at the American Museum of Natural History.<br style=\"box-sizing: border-box;\"><br style=\"box-sizing: border-box;\"></p><p style=\"text-align: justify; margin: 0px; font-size: 13px; line-height: 150%; box-sizing: border-box;\">As a key player who stimulates and promotes therapeutic innovation, we invite you to submit your innovation for consideration for this highest accolade in the following category:</p><ul style=\"margin: 15px 0px; box-sizing: border-box;\"><li style=\"font-size: 13px; box-sizing: border-box;\"><strong style=\"font-weight: 700; box-sizing: border-box;\">{{uSACategoryPrincipal}}</strong></li></ul><p style=\"margin: 0px; font-size: 13px; line-height: 150%; box-sizing: border-box;\">You can start your very simple submission process here and our team will be in touch shortly.</p><table align=\"left\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin: 20px 0px; border-collapse: collapse; border: none; empty-cells: show; max-width: 100%; box-sizing: border-box;\"><tbody style=\"box-sizing: border-box;\"><tr style=\"box-sizing: border-box;\"><td align=\"center\" bgcolor=\"#E60F51\" style=\"border-radius: 8px; min-width: 5px; box-sizing: border-box; border: 0px solid rgb(221, 221, 221); user-select: text;\"> <a href=\"https://www.galienfoundation.org/_hcms/mem/login\" t       "htmlB": "<div style=\"display: none; max-height: 0px; overflow: hidden; box-sizing: border-box;\">{{firstName}} {{lastName}} | {{company}} – You are eligible to a Prix Galien USA submission</div>\n\n<p style=\"font-family: Arial, sans-serif; font-size: 13px; line-height: 160%; color: rgb(51, 51, 51); margin: 0px; box-sizing: border-box;\">Dear {{firstName}},\n<br style=\"box-sizing: border-box;\">\n<br style=\"box-sizing: border-box;\">\n</p>\n\n<p style=\"font-family: Arial, sans-serif; font-size: 13px; line-height: 160%; color: rgb(51, 51, 51); margin: 0px; box-sizing: border-box;\">First, I would like to share my appreciation and support on the incredible missions of {{company}}. </p>\n\n<p style=\"font-family: Arial, sans-serif; font-size: 13px; line-height: 160%; color: rgb(51, 51, 51); margin: 0px; box-sizing: border-box;\">\n<br style=\"box-sizing: border-box;\">I would be pleased to share detailed information regarding the Prix Galien USA, an initiative I am working along with the Committee Chairs, <strong style=\"font-weight: 700; box-sizing: border-box;\">Kenneth C. Frazier - Retired Chairman and CEO, Merck &amp; Co</strong>., Inc. - and <strong style=\"font-weight: 700; box-sizing: border-box;\">Dr. Michael Rosenblatt - Member, Harvard Board of Overseers; Advisory Partner, Ascenta Capital &amp; Flagship Pioneering</strong> - and the <strong style=\"font-weight: 700; box-sizing: border-box;\">Galien Foundation.</strong></p>\n\n<p style=\"font-family: Arial, sans-serif; font-size: 13px; line-height: 160%; color: rgb(51, 51, 51); margin: 0px; box-sizing: border-box;\">\n<br style=\"box-sizing: border-box;\">The Galien Foundation fosters, recognizes and rewards excellence in scientific innovation that improves the state of human health. Worldwide, the Prix Galien is regarded as the equivalent of the <strong style=\"font-weight: 700; box-sizing: border-box;\">Nobel Prize</strong> in biopharmaceutical and medical technology research.\n<br style=\"box-sizing: border-box;\">\n<br style=\"box-sizing: border-box;\">\n</p>\n\n<p style=\"font-family: Arial, sans-serif; font-size: 13px; line-height: 160%; color: rgb(51, 51, 51); margin: 0px; box-sizing: border-box;\"><strong style=\"font-weight: 700; box-sizing: border-box;\">2026 will be an exceptional year:</strong> we are celebrating the <strong style=\"font-weight: 700; box-sizing: border-box;\">20th anniversary of the Prix Galien USA</strong> alongside the <strong style=\"font-weight: 700; box-sizing: border-box;\">International Prix Galien</strong>, which will bring together all worldwide winners from the past two years.</p>\n\n<p style=\"font-family: Arial, sans-serif; font-size: 13px; line-height: 160%; color: rgb(51, 51, 51); margin: 0px; box-sizing: border-box;\">\n<br style=\"box-sizing: border-box;\">We believe on {{company}}'s impact and innovation.  \n<br style=\"box-sizing: border-box;\">\n<br style=\"box-sizing: border-box;\">\n</p>\n\n<p style=\"font-family: Arial, sans-serif; font-size: 13px; line-height: 160%; color: rgb(51, 51, 51); margin: 0px; box-sizing: border-box;\">If it's relevant and if you are available, I would be delighted to discuss with you about your potential application and answer your questions. Would you be available on {% spin %}{% variation %}Monday 2:30 PM{% variation %}Wednesday 4:00 PM{% variation %}Friday 7:30 AM{% endspin %} EST for a quick call? \n<br style=\"box-sizing: border-box;\">\n<br style=\"box-sizing: border-box;\">If not, I'm happy to accommodate your schedule. You can also <a href=\"https://galienfoundation.org/meetings/pgusa/nomination\" style=\"color: rgb(26, 115, 232); text-decoration: none; background-color: transparent; user-select: auto; box-sizing: border-box; font-weight: 500;\">book a meeting here</a>.</p>\n\n<p style=\"font-family: Arial, sans-serif; font-size: 13px; line-height: 160%; color: rgb(51, 51, 51); margin: 0px; box-sizing: border-box;\">\n<br style=\"box-sizing: border-box;\">With many thanks an  many of the industry's greatest innovation champions.</p>\n\n<p style=\"text-align: justify; margin: 0px; font-size: 13px; line-height: 150%; box-sizing: border-box;\">\n<br style=\"box-sizing: border-box;\">In 2025, we honored groundbreaking innovations from Gilead Sciences, Regeneron &amp; Sanofi, Servier, Edwards Lifesciences, ŌURA, Endless Frontier Labs, Dren Bio, and Resuscitec, as well as Michael J. Fox for his extraordinary contributions to Parkinson's disease research.</p>\n\n<p style=\"text-align: justify; margin: 0px; font-size: 13px; line-height: 150%; box-sizing: border-box;\">\n<br style=\"box-sizing: border-box;\">Judges that review nominations have expertise in the sciences, financial services, and consulting and include biomedical scientists, entrepreneurs, physicians and executives at leading entities. Award recipients will be revealed in <strong style=\"font-weight: 700; box-sizing: border-box;\">New York City on Wednesday, October 29th, 2026</strong>, at the American Museum of Natural History.\n<br style=\"box-sizing: border-box;\">\n<br style=\"box-sizing: border-box;\">\n</p>\n\n<p style=\"text-align: justify; margin: 0px; font-size: 13px; line-height: 150%; box-sizing: border-box;\">As a key player who stimulates and promotes therapeutic innovation, we invite you to submit your innovation for consideration for this highest accolade in the following category:</p>\n\n<ul style=\"margin: 15px 0px; box-sizing: border-box;\">\n<li style=\"font-size: 13px; box-sizing: border-box;\"><strong style=\"font-weight: 700; box-sizing: border-box;\">{{uSACategoryPrincipal}}</strong></li>\n</ul>\n\n<p style=\"margin: 0px; font-size: 13px; line-height: 150%; box-sizing: border-box;\">You can start your very simple submission process here and our team will be in touch shortly.</p>\n\n<table align=\"left\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin: 20px 0px; border-collapse: collapse; border: none; empty-cells: show; max-width: 100%; box-si       "html": "Dear [First Name],<br><br>\nI hope this message finds you well.<br><br>\nThank you for your interest in the <b>Prix Galien USA 2026</b> -it\'s a pleasure to welcome you to this year\'s program. On behalf of the Committee, chaired by <b>Kenneth C. Frazier</b> and <b>Dr. Michael Rosenblatt</b>, and supported by a distinguished jury that includes <b>four Nobel Laureates</b>, we are honored that you are considering entering this esteemed competition, which recognizes excellence in biomedical research and development that improves the human condition. It\'s also a celebration of the dedicated teams behind these groundbreaking achievements!<br><br>\n<b>2026 will be an exceptional year:</b> we are celebrating the <b>20th anniversary of the Prix Galien USA</b> alongside the <b>International Prix Galien</b>, which will bring together all worldwide winners from the past two years.<br><br>\n[pitch]<br><br>\n<b>Here\'s what you need to know:</b><br>\n<ul>\n<li>Submission Deadline: April 30th, 2026</li>\n<li>You can always revisit your submission <a href=\"https://www.galienfoundation.org/sign-in\">here</a> (<i>Important: select \"Prix Galien USA\"</i>)</li>\n<li>To get familiar with the submission process you can watch the video <a href=\"https://youtu.be/XBZ4y4ftSM4\">here</a>.</li>\n<li>Award Ceremony: October 29, 2026</li>\n<li>Venue: American Museum of Natural History, New York City</li>\n<li>Winners of the USA Prix will automatically qualify for the Prix Galien International.</li>\n</ul>\n<b>Resources Attached:</b><br>\n<ul>\n<li><a href=\"https://www.calameo.com/read/0059259139d450b5065ce\">2026 Quick Facts Sheet - Digital Health</a>: An overview of the ceremony, including pricing options, ensuring your contributions enrich the Galien Foundation\'s projects like the Young African Scientists Initiative, the Jerusalem Ethics Forum, and the Prix Galien International.</li>\n<li><a href=\"https://www.calameo.com/read/005925913f6d00c3bc70b\">Mediakit 2026</a>: Includes background on the Galien Foundation and the history of the Prix Galien USA, an overview of the Committee members, and additional key details.</li>\n<li>Past winners\' submission forms are available <a href=\"https://www.calameo.com/subscriptions/8245251\">here</a>.</li>\n</ul>\n<i>As a reminder, submission packages and event tickets are fully tax-deductible. Given the event has exceeded venue capacity for the past three years, <b>we kindly ask that you confirm your contribution package and minimum ticket requirements as early as possible</b>. Additional tickets may be available later, and I\'ll be happy to update you accordingly.</i><br><br>\n<b>Support and Guidance Available:</b> I\'m here to assist with any questions and ensure your submission process is seamless. You can also <a href=\"https://galienfoundation.org/meetings/pgusa/nomination\">book a meeting</a> with me anytime.<br><br>\n<b>You\'re also invited: Galien Forum USA & Inaugural Galien Patient Summit</b><br>\n<ul>\n<li>Join us the same day (October 29) for the <b>Galien Forum USA</b> -a full-day event featuring Nobel Laureates, policymakers, and industry leaders discussing today\'s most pressing health challenges and innovations. Please find more information <a href=\"https://www.galienfoundation.org/galien-forum-usa-2025-program\">here</a> to get a sense of the experience.</li>\n<li>The <b>Galien Patient Summit</b> will run parallel to our prestigious Forum. Under the guiding principle \"No decision for me without me,\" we are creating a collaborative platform where patient voices directly shape the future of medical research, drug development, and healthcare delivery.</li>\n</ul>\nWe would be honored to celebrate your achievement with the Galien community. I look forward to your response.<br><br>\nAll my best,<br><br>\nEdouard Cohen",

let currentPipe = "forum";
let currentStep = null;
let currentBranch = 'A'; // 'A' or 'B' for steps with branches
let currentDraft = null;
let draftsCache = [];

// Auto-detect LinkedIn steps with embedded A/B branches and split them into htmlA/htmlB
function splitLinkedInBranches(s) {
  const parser = new DOMParser();
  const doc = parser.parseFromString('<div>' + s.html + '</div>', 'text/html');
  const branchDivs = doc.querySelectorAll('div[style*="border-left:3px solid"]');
  if (branchDivs.length < 2) return;
  const wrap = "<div style='font-family: Arial, sans-serif; font-size: 13px; line-height: 1.6; color: #333; padding: 8px 0;'>";
  function extractContent(div) {
    const label = div.querySelector('div[style*="font-size:10px"]');
    if (label) label.remove();
    return div.innerHTML.trim();
  }
  s.htmlA = wrap + extractContent(branchDivs[0]) + '</div>';
  s.htmlB = wrap + extractContent(branchDivs[1]) + '</div>';
}

function init() {
  // Split LinkedIn A/B branches before anything else
  for (const pipe of Object.values(STEPS)) {
    if (!Array.isArray(pipe)) continue;
    for (const s of pipe) {
      if (!s.htmlB && s.html && s.html.includes('BRANCHE A') && s.html.includes('BRANCHE B')) {
        splitLinkedInBranches(s);
      }
    }
  }
  const el = document.getElementById('pipelines');
  PIPES.forEach(p => {
    const steps = STEPS[p.id];
    const missing = steps.filter(s => s.status === 'no').length;
    const fix = steps.filter(s => s.status === 'fix').length;
    const tab = document.createElement('div');
    tab.className = 'pipe-tab' + (p.id === currentPipe ? ' active' : '');
    tab.innerHTML = p.label + (missing > 0 ? '<span class="pipe-count">' + missing + ' missing</span>' : '');
    tab.onclick = () => selectPipe(p.id);
    tab.dataset.id = p.id;
    el.appendChild(tab);
  });
  // Add Drafts tab before Matrix
  const matrixTab = el.querySelector('[data-id="matrix"]');
  const draftsTab = document.createElement('div');
  draftsTab.className = 'pipe-tab';
  draftsTab.dataset.id = 'drafts';
  draftsTab.innerHTML = 'Drafts <span class="draft-badge" id="draftsBadge" style="display:none">0</span>';
  draftsTab.onclick = () => selectPipe('drafts');
  el.insertBefore(draftsTab, matrixTab);
  loadDraftCount();
  setInterval(loadDraftCount, 30000);
  renderSteps();
}

function selectPipe(id) {
  currentPipe = id;
  currentStep = null;
  document.querySelectorAll('.pipe-tab').forEach(t => t.classList.toggle('active', t.dataset.id === id));

  // Hide all panels first
  document.getElementById('sidebar').style.display = 'none';
  document.getElementById('compose').style.display = 'none';
  document.getElementById('infoBar').style.display = 'none';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('matrixPanel').style.display = 'none';
  document.getElementById('contextPanel').style.display = 'none';
  document.getElementById('threadPanel').style.display = 'none';
  currentDraft = null;

  if (id === 'matrix') {
    renderMatrix();
    document.getElementById('matrixPanel').style.display = 'block';
  } else if (id === 'drafts') {
    document.getElementById('sidebar').style.display = 'block';
    document.getElementById('emptyState').style.display = 'flex';
    document.getElementById('emptyState').textContent = 'Select a draft from the sidebar';
    loadDrafts();
  } else {
    document.getElementById('sidebar').style.display = 'block';
    document.getElementById('emptyState').style.display = 'flex';
    document.getElementById('emptyState').textContent = 'Select a step from the sidebar';
    renderSteps();
  }
}

function renderSteps() {
  const el = document.getElementById('sidebar');
  el.innerHTML = '';
  STEPS[currentPipe].forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'step-item' + (currentStep === i ? ' active' : '');
    const statusTag = s.status === 'ok' ? '<span class="tag tag-ok">OK</span>' : s.status === 'fix' ? '<span class="tag tag-fix">Fix</span>' : '<span class="tag tag-no">Missing</span>';
    const sourceTag = s.source === 'lem' ? '<span class="tag tag-lem">Lemlist</span>' : '<span class="tag tag-esp">Espanso</span>';

    // Show input for ALL templates
    const triggerInput = '<div class="espanso-input"><input type="text" value="' + (s.tpl || '') + '" placeholder=":trigger" onchange="updateTrigger(' + i + ', this.value)" onclick="event.stopPropagation()"></div>';

    div.innerHTML = '<div class="step-num">' + s.num + '</div><div class="step-info"><div class="step-name">' + s.name + '</div><div class="step-meta">' + statusTag + sourceTag + '</div>' + triggerInput + '</div>';
    div.onclick = () => selectStep(i);
    el.appendChild(div);
  });
}

function selectStep(i) {
  swapFooterForDrafts(false);
  currentDraft = null;
  document.getElementById('threadPanel').style.display = 'none';
  // Auto-save current step before switching (keep edits in memory)
  if (currentStep !== null && currentStep !== i) {
    saveBranchContent();
  }
  currentStep = i;
  currentBranch = 'A';
  const s = STEPS[currentPipe][i];
  renderSteps();

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('compose').style.display = 'block';
  document.getElementById('infoBar').style.display = 'flex';

  // Show branch tabs: A/B icebreaker OR category branches
  const hasAB = !!s.htmlB;
  const hasCat = !!s.branches;
  const branchTabs = document.getElementById('branchTabs');

  if (hasCat) {
    // Category branches (Journey, After Meeting)
    const keys = Object.keys(s.branches);
    currentBranch = keys[0];
    let tabsHtml = '';
    keys.forEach((k, idx) => {
      const label = (s.branchLabels && s.branchLabels[k]) || k;
      const cls = idx === 0 ? 'btn btn-blue' : 'btn btn-grey';
      tabsHtml += '<button class="' + cls + '" onclick="switchBranch(\'' + k + '\')" data-branch="' + k + '" style="font-size:11px;padding:4px 14px;' + (idx > 0 ? 'margin-left:4px;' : '') + '">' + label + '</button>';
    });
    tabsHtml += '<span id="branchLabel" style="margin-left:10px;font-size:10px;color:#80868b;">Editing: ' + ((s.branchLabels && s.branchLabels[keys[0]]) || keys[0]) + '</span>';
    branchTabs.innerHTML = tabsHtml;
    branchTabs.style.display = 'block';
  } else if (hasAB) {
    // A/B icebreaker branches - restore original buttons
    branchTabs.innerHTML = '<button id="tabA" class="btn btn-blue" onclick="switchBranch(\'A\')" style="font-size:11px;padding:4px 14px;">Branche A — avec icebreaker</button>' +
      '<button id="tabB" class="btn btn-grey" onclick="switchBranch(\'B\')" style="font-size:11px;padding:4px 14px;margin-left:4px;">Branche B — sans icebreaker</button>' +
      '<span style="border-left:1px solid #dadce0;height:18px;margin:0 8px;"></span>' +
      '<button id="btnCopyAB" class="btn btn-grey" onclick="copyBranchTo()" style="font-size:10px;padding:3px 10px;">A → B</button>' +
      '<span id="branchLabel" style="margin-left:10px;font-size:10px;color:#80868b;">Editing Branch A</span>';
    branchTabs.style.display = 'block';
  } else {
    branchTabs.style.display = 'none';
  }

  document.getElementById('fieldTo').value = s.to;
  document.getElementById('fieldSubject').value = s.subject;
  document.getElementById('fieldPreview').value = s.preview || '';
  const rawHtml = hasCat ? s.branches[currentBranch] : (hasAB ? (s.htmlA || s.html) : s.html);
  document.getElementById('fieldBody').innerHTML = stripLinkedInBadge(rawHtml);
  updateStepTypeBadge(s);
  document.getElementById('espansoTrigger').value = s.espanso || (s.tpl && s.tpl.startsWith(':') ? s.tpl : '');
  document.getElementById('linkInfo').textContent = '';

  const statusButtons = ['ok','fix','no'].map(st => {
    const label = st === 'ok' ? 'OK' : st === 'fix' ? 'A revoir' : 'A creer';
    const cls = 'tag-' + st;
    const active = s.status === st;
    return '<span class="tag ' + cls + '" onclick="setStatus(\'' + st + '\')" style="cursor:pointer;' + (active ? 'outline:2px solid #202124;' : 'opacity:0.4;') + '">' + label + '</span>';
  }).join('');
  const sourceTag = s.source === 'lem' ? '<span class="tag tag-lem">Lemlist</span>' : '<span class="tag tag-esp">Espanso</span>';

  // Build docs list with ready-to-paste phrases
  const docsHTML = s.docs.filter(d => d !== 'Aucun').map(d => {
    const phrase = DOC_PHRASES[d];
    if (phrase) {
      const escaped = phrase.replace(/'/g, "\\'").replace(/"/g, '&quot;');
      return '<li style="margin-bottom:8px;padding:6px 8px;background:#f8f9fa;border-radius:4px;cursor:pointer;border-left:3px solid #dadce0;transition:all 0.15s;" ' +
        'onclick="insertPhrase(\'' + escaped + '\')" ' +
        'onmouseover="this.style.borderLeftColor=\'#1a73e8\';this.style.background=\'#e8f0fe\'" ' +
        'onmouseout="this.style.borderLeftColor=\'#dadce0\';this.style.background=\'#f8f9fa\'" ' +
        'title="Click to insert in email">' +
        '<span style="font-size:10px;color:#5f6368;font-weight:500;">' + d + '</span><br>' +
        '<span style="font-size:11px;color:#202124;">' + phrase + '</span></li>';
    }
    return '<li style="margin-bottom:4px;">' + d + '</li>';
  }).join('');

  document.getElementById('infoBar').innerHTML =
    '<div class="info-left"><h2>' + s.name + ' <small style="font-weight:400;font-size:12px;color:#80868b">(' + s.tpl + ')</small></h2><div class="info-tags">' + statusButtons + sourceTag + '</div></div>' +
    '<div class="info-docs"><b>Documents recommandés :</b><ul>' + (docsHTML || '<li style="color:#80868b;font-style:italic">Aucun</li>') + '</ul></div>';

  // Suggestion contextuelle : si ce step a une suggestion, l'afficher
  const sug = sugQueue.find(s => s.pipeline === currentPipe && s.step === currentStep);
  if (sug) {
    document.getElementById('sugSubject').value = sug.subject || '';
    document.getElementById('sugBody').innerHTML = sug.html || '';
    document.getElementById('sugStepName').textContent = sug.stepName || ('Step ' + sug.step);
    document.getElementById('suggestionCompose').style.display = 'block';
    document.querySelector('.editor-wrap').classList.add('split-mode');
    sugIndex = sugQueue.indexOf(sug);
    renderSugTabs();
  } else {
    document.getElementById('suggestionCompose').style.display = 'none';
    document.querySelector('.editor-wrap').classList.remove('split-mode');
  }
}

function setStatus(newStatus) {
  if (currentStep === null) return;
  const s = STEPS[currentPipe][currentStep];
  s.status = newStatus;
  renderSteps();
  selectStep(currentStep);
}

function insertPhrase(phrase) {
  const editor = document.getElementById('fieldBody');
  editor.focus();
  const sel = window.getSelection();
  if (sel.rangeCount > 0 && editor.contains(sel.anchorNode)) {
    document.execCommand('insertHTML', false, phrase);
  } else {
    editor.innerHTML += phrase;
  }
  document.getElementById('linkInfo').textContent = '✓ Inserted';
  setTimeout(() => document.getElementById('linkInfo').textContent = '', 1500);
}

function insertDocLink(title, url) {
  const editor = document.getElementById('fieldBody');
  const link = '<a href="' + url + '">' + title + '</a>';

  // Insert at cursor position or at end
  const sel = window.getSelection();
  if (sel.rangeCount > 0 && editor.contains(sel.anchorNode)) {
    const range = sel.getRangeAt(0);
    range.deleteContents();
    const node = range.createContextualFragment(link);
    range.insertNode(node);
  } else {
    editor.innerHTML += '<br>' + link;
  }

  editor.focus();
}

function copyHTML() {
  const html = buildLemlistHtml(document.getElementById('fieldBody').innerHTML);
  navigator.clipboard.writeText(html).then(() => {
    document.getElementById('toast').textContent = 'HTML copied!';
    setTimeout(() => document.getElementById('toast').textContent = '', 2000);
  });
}

function copyText() {
  navigator.clipboard.writeText(document.getElementById('fieldBody').innerText).then(() => {
    document.getElementById('toast').textContent = 'Text copied!';
    setTimeout(() => document.getElementById('toast').textContent = '', 2000);
  });
}

function updateTrigger(stepIndex, newTrigger) {
  STEPS[currentPipe][stepIndex].tpl = newTrigger;
}

function renderMatrix() {
  const tbody = document.getElementById('matrixBody');
  tbody.innerHTML = '';

  // Get max steps across all pipelines
  const maxSteps = Math.max(
    STEPS.forum.length,
    STEPS.gps.length,
    STEPS.candidats.length,
    STEPS.p1.length
  );

  // Build rows
  for (let i = 0; i < maxSteps; i++) {
    const row = document.createElement('tr');

    // Step number
    const numCell = document.createElement('td');
    numCell.className = 'matrix-step';
    numCell.textContent = STEPS.forum[i]?.num || '';
    row.appendChild(numCell);

    // Step name
    const nameCell = document.createElement('td');
    nameCell.className = 'matrix-step';
    nameCell.textContent = STEPS.forum[i]?.name || '';
    row.appendChild(nameCell);

    // Subject line (take from Forum as reference)
    const subjectCell = document.createElement('td');
    subjectCell.style.fontSize = '11px';
    subjectCell.style.color = '#5f6368';
    subjectCell.style.fontStyle = 'italic';
    subjectCell.textContent = STEPS.forum[i]?.subject || '-';
    row.appendChild(subjectCell);

    // Forum docs
    const forumCell = document.createElement('td');
    forumCell.className = 'matrix-docs';
    if (STEPS.forum[i]) {
      forumCell.innerHTML = STEPS.forum[i].docs.map(d =>
        '<span class="matrix-docs-item">• ' + d + '</span>'
      ).join('');
    }
    row.appendChild(forumCell);

    // GPS docs
    const gpsCell = document.createElement('td');
    gpsCell.className = 'matrix-docs';
    if (STEPS.gps[i]) {
      gpsCell.innerHTML = STEPS.gps[i].docs.map(d =>
        '<span class="matrix-docs-item">• ' + d + '</span>'
      ).join('');
    }
    row.appendChild(gpsCell);

    // Candidats docs
    const candCell = document.createElement('td');
    candCell.className = 'matrix-docs';
    if (STEPS.candidats[i]) {
      candCell.innerHTML = STEPS.candidats[i].docs.map(d =>
        '<span class="matrix-docs-item">• ' + d + '</span>'
      ).join('');
    }
    row.appendChild(candCell);

    // P1 docs
    const p1Cell = document.createElement('td');
    p1Cell.className = 'matrix-docs';
    if (STEPS.p1[i]) {
      p1Cell.innerHTML = STEPS.p1[i].docs.map(d =>
        '<span class="matrix-docs-item">• ' + d + '</span>'
      ).join('');
    }
    row.appendChild(p1Cell);

    tbody.appendChild(row);
  }
}

// Save current fieldBody content to the correct branch in memory
function saveBranchContent() {
  if (currentStep === null) return;
  const s = STEPS[currentPipe][currentStep];
  s.to = document.getElementById('fieldTo').value;
  s.subject = document.getElementById('fieldSubject').value;
  s.preview = document.getElementById('fieldPreview').value;
  let raw = document.getElementById('fieldBody').innerHTML;
  raw = normalizeLemlistHtml(raw);
  if (s.branches) {
    // Category branches (Journey, After Meeting)
    s.branches[currentBranch] = raw;
    s.html = raw; // Keep html in sync with current branch
  } else if (s.htmlB) {
    // A/B icebreaker branches
    if (currentBranch === 'A') s.htmlA = raw;
    else s.htmlB = raw;
  } else {
    s.html = raw;
  }
}

// Strip "LINKEDIN MESSAGE" badge from HTML content (it's shown as UI element instead)
function stripLinkedInBadge(html) {
  // Remove the flex div wrapper: <div style='display:flex;...'><span>LINKEDIN MESSAGE</span></div>
  html = html.replace(/<div[^>]*display:\s*flex[^>]*>[\s\S]*?LINKEDIN MESSAGE[\s\S]*?<\/div>/gi, '');
  // Remove standalone span badge: <span ...>LINKEDIN MESSAGE</span>
  html = html.replace(/<span[^>]*>LINKEDIN MESSAGE<\/span>/gi, '');
  // Clean leftover <br> at the start after badge removal
  html = html.replace(/^(\s*<div[^>]*>)\s*(<br\s*\/?>)+/i, '$1');
  return html;
}

// Show or hide the step type badge above the editor
function updateStepTypeBadge(step) {
  const badge = document.getElementById('stepTypeBadge');
  const isLinkedIn = step.subject === '(LinkedIn message)';
  if (isLinkedIn) {
    badge.style.display = 'block';
    badge.innerHTML = '<span style="display:inline-block;background:#e8f0fe;color:#1967d2;font-size:10px;font-weight:600;padding:2px 8px;border-radius:3px;">LINKEDIN MESSAGE</span>';
  } else {
    badge.style.display = 'none';
    badge.innerHTML = '';
  }
}

function normalizeLemlistHtml(html) {
  // Add margin:0 to ALL <p> tags to prevent double-spacing. Never touch font-size/family/color.
  return html.replace(/<p(\s[^>]*)?>|<p>/gi, function(m) {
    if (m.includes('margin')) return m;
    if (m === '<p>' || m === '<P>') return '<p style="margin: 0px;">';
    if (m.includes('style="')) return m.replace(/style="([^"]*)"/, 'style="$1; margin: 0px;"');
    // <p id="..." or <p class="..."> without style — add style attribute
    return m.replace(/<p/i, '<p style="margin: 0px;"');
  });
}

function buildLemlistHtml(bodyHtml) {
  // Normalize margins + prepend preview text div if set
  let html = normalizeLemlistHtml(bodyHtml);
  const preview = document.getElementById('fieldPreview').value.trim();
  if (preview) {
    html = '<div style="display: none; max-height: 0px; overflow: hidden; box-sizing: border-box;">' + preview + '</div>' + html;
  }
  return html;
}

function switchBranch(branch) {
  if (currentStep === null) return;
  // Save current branch content first
  saveBranchContent();
  currentBranch = branch;
  const s = STEPS[currentPipe][currentStep];

  if (s.branches) {
    // Category branches
    const branchHtml = s.branches[branch] || '';
    document.getElementById('fieldBody').innerHTML = stripLinkedInBadge(branchHtml);
    // Update tab highlights
    document.querySelectorAll('#branchTabs button[data-branch]').forEach(btn => {
      btn.className = btn.dataset.branch === branch ? 'btn btn-blue' : 'btn btn-grey';
    });
    const label = (s.branchLabels && s.branchLabels[branch]) || branch;
    document.getElementById('branchLabel').textContent = 'Editing: ' + label;
  } else {
    // A/B icebreaker branches
    const branchHtml = branch === 'A' ? (s.htmlA || s.html) : s.htmlB;
    document.getElementById('fieldBody').innerHTML = stripLinkedInBadge(branchHtml);
    document.getElementById('tabA').className = branch === 'A' ? 'btn btn-blue' : 'btn btn-grey';
    document.getElementById('tabB').className = branch === 'B' ? 'btn btn-blue' : 'btn btn-grey';
    document.getElementById('branchLabel').textContent = 'Editing Branch ' + branch;
    document.getElementById('btnCopyAB').textContent = branch === 'A' ? 'A → B' : 'B → A';
  }
}

function copyBranchTo() {
  if (currentStep === null) return;
  const s = STEPS[currentPipe][currentStep];
  if (!s.htmlB) return;
  const target = currentBranch === 'A' ? 'B' : 'A';
  if (!confirm('Copy Branch ' + currentBranch + ' content to Branch ' + target + '?')) return;
  // Save current content first
  saveBranchContent();
  // Copy
  const currentContent = document.getElementById('fieldBody').innerHTML;
  if (target === 'B') s.htmlB = currentContent;
  else s.htmlA = currentContent;
  const toast = document.getElementById('toast');
  toast.textContent = '✓ Copied to Branch ' + target;
  toast.style.color = '#34a853';
  setTimeout(() => { toast.textContent = ''; }, 2000);
}

function saveStep() {
  if (currentStep === null) return;
  // Save current branch content to memory first
  saveBranchContent();
  const s = STEPS[currentPipe][currentStep];

  // Prepare save payload
  const payload = {
    steps: STEPS,
    source: s.source,
    espansoTrigger: s.espanso || (s.tpl && s.tpl.startsWith(':') ? s.tpl : null),
    subject: s.subject,
    body: s.html
  };

  // Feedback loop: if this save follows an accepted suggestion, send the diff for rule generation
  if (acceptedSuggestion) {
    const editedHtml = s.html;
    const editedSubject = s.subject;
    fetch('http://localhost:3456/feedback-suggestion', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        original_html: acceptedSuggestion.html,
        edited_html: editedHtml,
        original_subject: acceptedSuggestion.subject,
        edited_subject: editedSubject
      })
    }).catch(() => {});
    acceptedSuggestion = null;
  }

  // Send to server
  document.getElementById('toast').textContent = 'Saving...';
  fetch('http://localhost:3456/save', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  })
  .then(r => r.json())
  .then(data => {
    if (data.success) {
      document.getElementById('toast').textContent = '✓ Saved successfully!';
      document.getElementById('toast').style.color = '#34a853';
    } else {
      document.getElementById('toast').textContent = '✗ Save failed: ' + data.error;
      document.getElementById('toast').style.color = '#ea4335';
    }
    setTimeout(() => {
      document.getElementById('toast').textContent = '';
      document.getElementById('toast').style.color = '#34a853';
    }, 3000);
  })
  .then(() => renderSteps()) // Re-render to show updated trigger
  .catch(err => {
    document.getElementById('toast').textContent = '✗ Server not running. Run: ~/template-editor/start.sh';
    document.getElementById('toast').style.color = '#ea4335';
    setTimeout(() => {
      document.getElementById('toast').textContent = '';
      document.getElementById('toast').style.color = '#34a853';
    }, 4000);
  });
}

// Save current template as Espanso snippet
function saveEspanso() {
  if (currentStep === null) return;

  // ALWAYS save the step to file first (so index.html stays in sync)
  saveStep();

  const s = STEPS[currentPipe][currentStep];
  const trigger = document.getElementById('espansoTrigger').value.trim();

  if (!trigger) { alert('Enter a trigger (e.g. :callforpartners)'); return; }
  if (!trigger.startsWith(':')) { alert('Trigger must start with :'); return; }

  const toast = document.getElementById('toast');
  toast.textContent = 'Saving Espanso...';

  // Clean HTML for Espanso (strip inline styles, keep formatting)
  const body = document.getElementById('fieldBody').innerHTML;
  const cleanHtml = body
    .replace(/<div[^>]*display:\s*none[^>]*>[\s\S]*?<\/div>/gi, '')
    .replace(/<img[^>]*>/gi, '')
    .replace(/<strong[^>]*>/gi, '<b>').replace(/<\/strong>/gi, '</b>')
    .replace(/<em[^>]*>/gi, '<i>').replace(/<\/em>/gi, '</i>')
    .replace(/\s*style="[^"]*"/gi, '')
    .replace(/\s*data-[a-z-]+="[^"]*"/gi, '')
    .replace(/\s*id="[^"]*"/gi, '')
    .replace(/<p[^>]*>/gi, '').replace(/<\/p>/gi, '<br>')
    .replace(/<br[^>]*\/?>/gi, '<br>')
    .replace(/<div[^>]*>/gi, '').replace(/<\/div>/gi, '')
    .replace(/<small[^>]*>/gi, '').replace(/<\/small>/gi, '')
    .replace(/<font[^>]*>/gi, '').replace(/<\/font>/gi, '')
    .replace(/&nbsp;/g, ' ')
    .replace(/(<br>\s*){3,}/g, '<br><br>')
    .replace(/ {2,}/g, ' ')
    // Convert Lemlist {{vars}} to [VARS] for Espanso (Espanso crashes on {{)
    .replace(/\{\{(\w+)\}\}/g, '[$1]')
    // Convert Lemlist {% spin %} blocks to plain text
    .replace(/\{%\s*spin\s*%\}[\s\S]*?\{%\s*endspin\s*%\}/g, '[TIME]')
    .trim();

  // Save to server (Espanso only)
  fetch('http://localhost:3456/save-espanso', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ trigger: trigger, html: cleanHtml })
  })
  .then(r => r.json())
  .then(data => {
    if (data.success) {
      toast.textContent = '✓ Espanso saved: ' + trigger;
      toast.style.color = '#34a853';
      // Store trigger on the step
      s.espanso = trigger;
    } else {
      toast.textContent = '✗ ' + data.error;
      toast.style.color = '#ea4335';
    }
    setTimeout(() => { toast.textContent = ''; toast.style.color = '#34a853'; }, 3000);
  })
  .catch(() => {
    toast.textContent = '✗ Server not running';
    toast.style.color = '#ea4335';
    setTimeout(() => { toast.textContent = ''; toast.style.color = '#34a853'; }, 3000);
  });
}

// Clean all font-family and font-size from body content
function cleanFonts() {
  const body = document.getElementById('fieldBody');
  body.querySelectorAll('*').forEach(el => {
    el.style.removeProperty('font-family');
    el.style.removeProperty('font-size');
    el.style.removeProperty('line-height');
    el.style.removeProperty('color');
    // Remove <font> tags but keep content
    if (el.tagName === 'FONT') {
      const parent = el.parentNode;
      while (el.firstChild) parent.insertBefore(el.firstChild, el);
      parent.removeChild(el);
    }
    // Remove empty style attributes
    if (el.getAttribute('style') === '') el.removeAttribute('style');
  });
  // Remove <span> wrappers that only had style (no semantic meaning)
  body.querySelectorAll('span:not([class])').forEach(span => {
    if (!span.getAttribute('style') && !span.getAttribute('id')) {
      const parent = span.parentNode;
      while (span.firstChild) parent.insertBefore(span.firstChild, span);
      parent.removeChild(span);
    }
  });
  document.getElementById('linkInfo').textContent = '✓ Fonts cleaned';
  setTimeout(() => document.getElementById('linkInfo').textContent = '', 2000);
}

function applyFontSize(size) {
  if (!size) return;
  document.execCommand('fontSize', false, '1');
  document.getElementById('fieldBody').querySelectorAll('font[size="1"]').forEach(font => {
    const span = document.createElement('span');
    span.style.fontSize = size;
    span.innerHTML = font.innerHTML;
    font.parentNode.replaceChild(span, font);
  });
}

function applyFontFamily(family) {
  if (!family) return;
  document.execCommand('fontName', false, '__tmp__');
  document.getElementById('fieldBody').querySelectorAll('font[face="__tmp__"]').forEach(font => {
    const span = document.createElement('span');
    span.style.fontFamily = family;
    span.innerHTML = font.innerHTML;
    font.parentNode.replaceChild(span, font);
  });
}

// Clean paste: strip font styles on paste
document.addEventListener('DOMContentLoaded', () => {
  const body = document.getElementById('fieldBody');
  if (body) {
    body.addEventListener('paste', (e) => {
      // Let the paste happen, then clean fonts + normalize <p> margins
      setTimeout(() => {
        cleanFonts();
        // Fix pasted <p> tags that lack margin:0 (causes double-spacing)
        body.querySelectorAll('p').forEach(p => {
          if (!p.style.margin && !p.style.marginTop && !p.style.marginBottom) {
            p.style.margin = '0px';
          }
        });
      }, 50);
    });
  }
  // Extract preview text from HTML into separate field for all steps
  const previewRe = /<div[^>]*display:\s*none[^>]*>([\s\S]*?)<\/div>/i;
  for (const pipe of Object.keys(STEPS)) {
    for (const s of STEPS[pipe]) {
      if (s.preview) continue; // already has preview field
      const m = (s.html || '').match(previewRe);
      if (m) {
        s.preview = m[1].trim();
        s.html = s.html.replace(m[0], ''); // remove from body
      }
    }
  }
});

// Insert or edit a link on selected text
function insertLink() {
  const sel = window.getSelection();
  if (!sel.rangeCount) return;

  // Check if cursor is already on a link
  let node = sel.anchorNode;
  while (node && node.tagName !== 'A') node = node.parentElement;

  if (node && node.tagName === 'A') {
    // Edit existing link
    const newUrl = prompt('Edit URL (empty to remove):', node.href);
    if (newUrl === null) return; // cancelled
    if (newUrl === '') {
      // Remove link, keep text
      const text = document.createTextNode(node.textContent);
      node.parentNode.replaceChild(text, node);
    } else {
      node.href = newUrl;
    }
  } else {
    // New link
    const text = sel.toString();
    if (!text) {
      alert('Select some text first, then click 🔗');
      return;
    }
    const url = prompt('URL for "' + text.substring(0, 40) + '":', 'https://');
    if (!url || url === 'https://') return;
    document.execCommand('createLink', false, url);
  }
}

// Show link URL when cursor is on a link
document.getElementById('fieldBody').addEventListener('click', function(e) {
  const info = document.getElementById('linkInfo');
  let node = e.target;
  while (node && node.tagName !== 'A' && node.id !== 'fieldBody') node = node.parentElement;
  if (node && node.tagName === 'A') {
    info.textContent = '🔗 ' + node.href;
    info.style.color = '#1a73e8';
  } else {
    info.textContent = '';
  }
});

// Ctrl/Cmd+K shortcut for link
document.getElementById('fieldBody').addEventListener('keydown', function(e) {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    insertLink();
  }
});

let _lemlistCampaigns = null; // cache

function getPlainText(html) {
  let text = html;
  // Convert block elements and <br> to newlines
  text = text.replace(/<br\s*\/?>/gi, '\n');
  text = text.replace(/<\/p>\s*<p[^>]*>/gi, '\n\n');
  text = text.replace(/<\/(div|p|li|h[1-6])>/gi, '\n');
  // Strip remaining tags
  text = text.replace(/<[^>]+>/g, '');
  // Decode HTML entities
  text = text.replace(/&nbsp;/gi, ' ');
  text = text.replace(/&amp;/gi, '&');
  text = text.replace(/&lt;/gi, '<');
  text = text.replace(/&gt;/gi, '>');
  text = text.replace(/&#(\d+);/g, (m, n) => String.fromCharCode(n));
  // Clean up excessive blank lines
  text = text.replace(/\n{3,}/g, '\n\n');
  return text.trim();
}
